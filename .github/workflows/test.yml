name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Use Node.js 20.x
        uses: actions/setup-node@v4
        with:
          node-version: 20.x

      - uses: pnpm/action-setup@v4
        with:
          version: 10.30.2
          run_install: true

      - name: Build extension
        run: pnpm build

      - name: Check TypeScript
        run: npx tsc --noEmit

      - name: Run tests
        run: pnpm test
