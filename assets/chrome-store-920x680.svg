<svg viewBox="0 0 920 680" xmlns="http://www.w3.org/2000/svg">
    <!-- Background gradient -->
    <defs>
        <linearGradient id="mainGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#F0F9FF;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#E0E7FF;stop-opacity:1" />
        </linearGradient>
        <linearGradient id="iconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#3B82F6;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#1E40AF;stop-opacity:1" />
        </linearGradient>
    </defs>

    <rect width="920" height="680" fill="url(#mainGrad)" />

    <!-- Left section - Main icon with shadow -->
    <g transform="translate(80, 150)">
        <!-- Large shadow -->
        <rect x="20" y="20" width="280" height="280" rx="56" fill="#000" opacity="0.08"
            filter="blur(16)" />

        <!-- Main icon background -->
        <rect width="280" height="280" fill="url(#iconGrad)" rx="56" />

        <!-- Large price tag icon -->
        <g transform="translate(70, 70)">
            <path
                d="M 20 0 L 100 0 Q 120 0 120 20 L 120 60 Q 120 80 100 100 L 50 120 L 0 50 Q 0 0 20 0"
                fill="white" opacity="0.95" />
            <text x="60" y="75" font-family="Arial, sans-serif" font-size="70" font-weight="bold"
                text-anchor="middle" fill="#3B82F6">$</text>
        </g>

        <!-- Comparison indicators -->
        <g transform="translate(120, 220)" opacity="0.85">
            <line x1="-30" y1="-8" x2="30" y2="-8" stroke="white" stroke-width="4"
                stroke-linecap="round" />
            <line x1="-30" y1="0" x2="30" y2="0" stroke="white" stroke-width="4"
                stroke-linecap="round" />
            <line x1="-30" y1="8" x2="30" y2="8" stroke="white" stroke-width="4"
                stroke-linecap="round" />
        </g>
    </g>

    <!-- Right section - Content -->
    <g transform="translate(440, 120)">
        <!-- Main title -->
        <text x="0" y="0" font-family="Arial, sans-serif" font-size="56" font-weight="bold"
            fill="#1E293B">CSGO Price</text>
        <text x="0" y="70" font-family="Arial, sans-serif" font-size="56" font-weight="bold"
            fill="#3B82F6">Helper</text>

        <!-- Tagline -->
        <text x="0" y="130" font-family="Arial, sans-serif" font-size="18" fill="#64748B">
            Smart price comparison for CS:GO traders
        </text>

        <!-- Feature list -->
        <g transform="translate(0, 180)">
            <!-- Feature 1 -->
            <g>
                <rect x="0" y="0" width="12" height="12" rx="2" fill="#3B82F6" />
                <text x="24" y="10" font-family="Arial, sans-serif" font-size="16" fill="#334155">
                    Compare prices across multiple platforms
                </text>
            </g>

            <!-- Feature 2 -->
            <g transform="translate(0, 50)">
                <rect x="0" y="0" width="12" height="12" rx="2" fill="#3B82F6" />
                <text x="24" y="10" font-family="Arial, sans-serif" font-size="16" fill="#334155">
                    Real-time data from Steam, BUFF, UUYP, C5 &amp; IGXE
                </text>
            </g>

            <!-- Feature 3 -->
            <g transform="translate(0, 100)">
                <rect x="0" y="0" width="12" height="12" rx="2" fill="#3B82F6" />
                <text x="24" y="10" font-family="Arial, sans-serif" font-size="16" fill="#334155">
                    Direct links to each platform for quick access
                </text>
            </g>

            <!-- Feature 4 -->
            <g transform="translate(0, 150)">
                <rect x="0" y="0" width="12" height="12" rx="2" fill="#3B82F6" />
                <text x="24" y="10" font-family="Arial, sans-serif" font-size="16" fill="#334155">
                    Rental prices from UUYP &amp; IGXE
                </text>
            </g>
        </g>

        <!-- CTA -->
        <rect x="0" y="430" width="280" height="60" rx="12" fill="#3B82F6" />
        <text x="140" y="470" font-family="Arial, sans-serif" font-size="18" font-weight="bold"
            text-anchor="middle" fill="white">Add to Chrome</text>
    </g>

    <!-- Bottom info -->
    <text x="460" y="650" font-family="Arial, sans-serif" font-size="14" fill="#94A3B8">
        Free • Easy to use • Privacy-focused
    </text>
</svg>