<svg viewBox="0 0 440 280" xmlns="http://www.w3.org/2000/svg">
    <!-- Background -->
    <defs>
        <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#F8FAFC;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#E2E8F0;stop-opacity:1" />
        </linearGradient>
        <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#3B82F6;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#1E40AF;stop-opacity:1" />
        </linearGradient>
    </defs>

    <rect width="440" height="280" fill="url(#bgGrad)" />

    <!-- Left side - Icon showcase -->
    <g transform="translate(60, 70)">
        <!-- Icon shadow -->
        <rect x="10" y="10" width="100" height="100" rx="24" fill="#000" opacity="0.1"
            filter="blur(8)" />

        <!-- Icon -->
        <rect width="100" height="100" fill="url(#blueGrad)" rx="24" />

        <!-- Price tag -->
        <g transform="translate(25, 25)">
            <path d="M 8 0 L 40 0 Q 48 0 48 8 L 48 20 Q 48 24 44 28 L 20 35 L 0 16 Q 0 0 8 0"
                fill="white" opacity="0.9" />
            <text x="24" y="24" font-family="Arial, sans-serif" font-size="20" font-weight="bold"
                text-anchor="middle" fill="#3B82F6">$</text>
        </g>

        <!-- Comparison indicator -->
        <g transform="translate(50, 65)" opacity="0.8">
            <line x1="-10" y1="-3" x2="10" y2="-3" stroke="white" stroke-width="2"
                stroke-linecap="round" />
            <line x1="-10" y1="0" x2="10" y2="0" stroke="white" stroke-width="2"
                stroke-linecap="round" />
            <line x1="-10" y1="3" x2="10" y2="3" stroke="white" stroke-width="2"
                stroke-linecap="round" />
        </g>
    </g>

    <!-- Right side - Text -->
    <g transform="translate(200, 60)">
        <!-- Title -->
        <text x="0" y="0" font-family="Arial, sans-serif" font-size="32" font-weight="bold"
            fill="#1E293B">CSGO Price</text>
        <text x="0" y="40" font-family="Arial, sans-serif" font-size="32" font-weight="bold"
            fill="#3B82F6">Helper</text>

        <!-- Subtitle -->
        <text x="0" y="85" font-family="Arial, sans-serif" font-size="14" fill="#64748B">
            Compare prices across platforms
        </text>
        <text x="0" y="105" font-family="Arial, sans-serif" font-size="14" fill="#64748B">
            Steam, BUFF, UUYP, C5 &amp; IGXE
        </text>

        <!-- Features -->
        <g transform="translate(0, 130)">
            <circle cx="8" cy="8" r="4" fill="#3B82F6" />
            <text x="20" y="12" font-family="Arial, sans-serif" font-size="12" fill="#475569">Sell,
                buy &amp; rent prices</text>

            <circle cx="8" cy="30" r="4" fill="#3B82F6" />
            <text x="20" y="34" font-family="Arial, sans-serif" font-size="12" fill="#475569">5
                platforms, one click</text>
        </g>
    </g>
</svg>